name: Film Arşivini Güncelle

on:
  schedule:
    # Her gece Türkiye saatiyle 03:00'te çalışır
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manuel çalıştırma için

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        npm init -y
        npm install axios
    
    - name: Run movie scraper
      env:
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      run: node scrape.js
    
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add filmler/*.m3u
        git diff --quiet && git diff --staged --quiet || git commit -m "Update movies archive $(date +'%Y-%m-%d')"
        git push
