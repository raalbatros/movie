name: OK.ru Test
on:
  workflow_dispatch:

jobs:
  test-okru:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - run: npm install

    - name: Test OK.ru
      run: node test-okru.js

    - name: Upload test M3U
      uses: actions/upload-artifact@v4
      with:
        name: test-okru-m3u
        path: test-okru.m3u
